########################################
# Game
########################################

set gamename rdr3

########################################
# Network
########################################

# Only change the IP if you are using a server with multiple network interfaces.
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

sv_maxclients 8

# Required for server-side state awareness.
set onesync on

########################################
# Server Information
########################################

sv_hostname "Trembita Games | Vanilla RedM"

sets sv_projectName "redm-vanilla-template"
sets sv_projectDesc "Minimal vanilla-first RedM server template"

load_server_icon server-icon.png

########################################
# Resources
########################################

ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager-rdr3
ensure basic-gamemode
ensure hardcap
ensure rconlog

########################################
# Security
########################################

# Allows players to use scripthook-based plugins when set to 1.
sv_scriptHookAllowed 0

########################################
# Permissions
########################################

exec permissions.cfg

########################################
# Tags
########################################

sets tags "vanilla,redm,template"

########################################
# Locale
########################################

sets locale "en-US"

########################################
# Local Configuration
########################################

# Local secrets and machine-specific settings.
# Copy local.example.cfg to local.cfg and set your own values.
exec local.cfg

########################################
# Optional
########################################

